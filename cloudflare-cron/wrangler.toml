name = "xpilot-cron"
main = "src/index.ts"
compatibility_date = "2026-02-18"

[observability.logs]
enabled = true

# ── Production (default) ──
# Deploy: npx wrangler deploy
# Secrets: npx wrangler secret put APP_BASE_URL / CRON_SECRET
# 3 triggers covering full 24h cycle (every ~8 hours)
# Cloudflare free plan: max 5 triggers but account-level shared limit
[triggers]
crons = ["0 1 * * *", "0 9 * * *", "0 17 * * *"]

# ── Dev environment ──
# Deploy: npx wrangler deploy --env dev
# Secrets: npx wrangler secret put APP_BASE_URL --env dev
#          npx wrangler secret put CRON_SECRET --env dev
[env.dev]
name = "xpilot-cron-dev"

[env.dev.triggers]
crons = ["*/5 * * * *"]
